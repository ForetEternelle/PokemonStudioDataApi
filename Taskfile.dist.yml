version: '3'
silent: true

env:
  DEV_PORT: 8000
  DEV_LOG_LEVEL: "INFO"
  DEV_DATA_FOLDER: "./test/test_resources/valid-data/"

tasks:
  dev:
    cmds:
      - go run ./cmds/psapi -port=${DEV_PORT} -log-level=${DEV_LOG_LEVEL} -data=${DEV_DATA_FOLDER} -cors="*"

  clean:
    cmds:
      - rm -rf build/

  generate:
    cmds:
      - npx @openapitools/openapi-generator-cli generate -c ./openapitools-go-server.json
      - npx @openapitools/openapi-generator-cli generate -c ./openapitools-yaml.json

  test:
    cmds:
      - go test ./...

  build:
    deps:
      - clean
    cmds:
      - go build -o build/psapi ./cmds/psapi 
