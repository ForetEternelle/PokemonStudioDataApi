openapi: "3.0.0"

info:
  version: 0.0.1
  title: Pokemon Studio API
  description: API for the Pokemon Studio
servers:
  - url: "http://localhost:8000/"
paths:
  /pokemon:
    $ref: "paths/pokemon/pokemonPage.yml"
  /pokemon/{symbol}:
    $ref: "paths/pokemon/pokemonDetails.yml"
  /pokemon/{symbol}/forms:
    $ref: "paths/pokemon/forms.yml"
  /pokemon/{symbol}/forms/{form}:
    $ref: "paths/pokemon/pokemonForm.yml"

  /types:
    $ref: "paths/types/types.yml"
  /types/{symbol}:
    $ref: "paths/types/typeDetails.yml"

  /moves/{symbol}:
    $ref: "paths/moves/move.yml"
  /moves/detail/{symbol}:
    $ref: "paths/moves/moveDetails.yml"

  /abilities:
    $ref: "paths/abilities/ability.yml"
  /abilities/{symbol}:
    $ref: "paths/abilities/abilityDetails.yml"
