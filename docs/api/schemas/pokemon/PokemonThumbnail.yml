type: object
description: An object containing base information to display a pokemon
properties:
  symbol:
    type: string
    description: The symbol of the pokemon
    example: "pikachu"
  name:
    type: string
    description: The translated name of the first pokemon's form
    example: "Pikachu"
  number:
    type: integer
    description: The number of the pokemon
    example: 25
  image:
    type: string
    description: The image symbol of the pokemon
    example: "025"
  type1:
    description: The first type
    $ref: "../types/TypePartial.yml"
    nullable: false
  type2:
    $ref: "../types/TypePartial.yml"
    description: The second type
    nullable: true
  customProperties:
    $ref: "../CustomProperties.yml"
    description: Custom properties setted by the developer
